services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}
    image: iai-translation-backend:latest
    container_name: iai-translation-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: iai-translation-frontend:latest
    container_name: iai-translation-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
