name: Publish Docker Images (GHCR)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner
        run: echo "OWNER_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image (model preloaded)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/iai-translation-backend:latest
            ghcr.io/${{ env.OWNER_LOWER }}/iai-translation-backend:${{ github.ref_name }}
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/iai-translation-frontend:latest
            ghcr.io/${{ env.OWNER_LOWER }}/iai-translation-frontend:${{ github.ref_name }}
